<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100">
  <rect width="1600" height="1100" fill="#ffffff"/>
  <style>
    .title{font:700 56px Arial, sans-serif;fill:#172033}
    .state{font:700 40px Arial, sans-serif;fill:#172033}
    .label{font:700 31px Arial, sans-serif;fill:#172033}
    .small{font:500 26px Arial, sans-serif;fill:#44546f}
    .card{fill:#f8fafc;stroke:#cbd5e1;stroke-width:4}
    .arrowHot{stroke:#d9480f;stroke-width:8;fill:none;marker-end:url(#arrowHot)}
    .arrowCold{stroke:#1c7ed6;stroke-width:8;fill:none;marker-end:url(#arrowCold)}
    .particle{fill:#2f80ed;stroke:#1450a3;stroke-width:3}
    .particle2{fill:#20a464;stroke:#0b6b3a;stroke-width:3}
    .particle3{fill:#f2994a;stroke:#b85f00;stroke-width:3}
  </style>

  <defs>
    <marker id="arrowHot" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#d9480f"/>
    </marker>
    <marker id="arrowCold" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#1c7ed6"/>
    </marker>
  </defs>

  <text x="800" y="78" text-anchor="middle" class="title">Mudanças de estado físico</text>

  <rect x="80" y="230" width="365" height="330" rx="22" class="card"/>
  <rect x="620" y="230" width="365" height="330" rx="22" class="card"/>
  <rect x="1155" y="230" width="365" height="330" rx="22" class="card"/>

  <text x="262" y="300" text-anchor="middle" class="state">Sólido</text>
  <text x="802" y="300" text-anchor="middle" class="state">Líquido</text>
  <text x="1338" y="300" text-anchor="middle" class="state">Gasoso</text>

  <g transform="translate(165 360)">
    <circle cx="0" cy="0" r="24" class="particle"/>
    <circle cx="68" cy="0" r="24" class="particle"/>
    <circle cx="136" cy="0" r="24" class="particle"/>
    <circle cx="0" cy="68" r="24" class="particle"/>
    <circle cx="68" cy="68" r="24" class="particle"/>
    <circle cx="136" cy="68" r="24" class="particle"/>
    <circle cx="0" cy="136" r="24" class="particle"/>
    <circle cx="68" cy="136" r="24" class="particle"/>
    <circle cx="136" cy="136" r="24" class="particle"/>
  </g>

  <g transform="translate(705 360)">
    <circle cx="10" cy="30" r="24" class="particle2"/>
    <circle cx="95" cy="5" r="24" class="particle2"/>
    <circle cx="175" cy="45" r="24" class="particle2"/>
    <circle cx="42" cy="130" r="24" class="particle2"/>
    <circle cx="122" cy="143" r="24" class="particle2"/>
    <circle cx="200" cy="115" r="24" class="particle2"/>
    <circle cx="90" cy="82" r="24" class="particle2"/>
  </g>

  <g transform="translate(1235 355)">
    <circle cx="10" cy="20" r="24" class="particle3"/>
    <circle cx="185" cy="40" r="24" class="particle3"/>
    <circle cx="95" cy="130" r="24" class="particle3"/>
    <circle cx="235" cy="185" r="24" class="particle3"/>
    <circle cx="40" cy="210" r="24" class="particle3"/>
  </g>

  <text x="532" y="175" text-anchor="middle" class="label">Fusão</text>
  <text x="532" y="210" text-anchor="middle" class="small">recebe calor</text>
  <path d="M455 285 C500 245, 555 245, 610 285" class="arrowHot"/>

  <text x="532" y="645" text-anchor="middle" class="label">Solidificação</text>
  <text x="532" y="680" text-anchor="middle" class="small">perde calor</text>
  <path d="M610 520 C555 575, 500 575, 455 520" class="arrowCold"/>

  <text x="1070" y="175" text-anchor="middle" class="label">Vaporização</text>
  <text x="1070" y="210" text-anchor="middle" class="small">recebe calor</text>
  <path d="M995 285 C1040 245, 1095 245, 1145 285" class="arrowHot"/>

  <text x="1070" y="645" text-anchor="middle" class="label">Condensação</text>
  <text x="1070" y="680" text-anchor="middle" class="small">perde calor</text>
  <path d="M1145 520 C1095 575, 1040 575, 995 520" class="arrowCold"/>

  <path d="M280 735 C560 910, 1040 910, 1320 735" class="arrowHot"/>
  <text x="800" y="790" text-anchor="middle" class="label">Sublimação</text>
  <text x="800" y="826" text-anchor="middle" class="small">sólido para gasoso: recebe calor</text>

  <path d="M1320 815 C1040 1030, 560 1030, 280 815" class="arrowCold"/>
  <text x="800" y="1008" text-anchor="middle" class="label">Ressublimação</text>
  <text x="800" y="1044" text-anchor="middle" class="small">gasoso para sólido: perde calor</text>
</svg>
